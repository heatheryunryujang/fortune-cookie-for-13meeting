<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🥠 포춘쿠키 뽑기</title>

    <!-- ✅ 카카오톡 링크 미리보기 (썸네일) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="🥠 포춘쿠키 뽑기">
    <meta property="og:description" content="오늘의 행운 메시지를 확인해보세요!">
    <meta property="og:image" content="https://raw.githubusercontent.com/heatheryunryujang/fortune-cookie-for-13meeting/refs/heads/main/13%EB%AF%B8%ED%8C%85%20thumbnail.png">
    <meta property="og:url" content="https://heatheryunryujang.github.io/fortune-cookie-for-13meeting/">

    <!-- 카카오 SDK -->
    <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
        #resultMsg {
            margin-top: 30px;
            font-size: 20px;
        }
        #shareBtn {
            display: none;
        }
    </style>
</head>
<body>

    <h1>🥠 포춘쿠키 뽑기</h1>

    <button id="drawBtn" onclick="drawCookie()">쿠키 뽑기</button>

    <div id="resultMsg"></div>

    <button id="shareBtn">카카오톡으로 공유하기</button>

    <script>
        // ✅ 카카오 SDK 초기화
        Kakao.init('ee4172b60f932968f266175b7efddddf');

        // ✅ 포춘 메시지
        const fortuneMessages = [
            "오늘은 뜻밖의 행운이 찾아올 거예요! 🍀",
            "조만간 반가운 소식이 들려올 것입니다. 💌",
            "주변 사람들에게 미소 지어보세요. 좋은 일이 생길 거예요! 😊",
            "작은 용기가 큰 변화를 만들어냅니다 💫 오늘 한 걸음 내딛어 보세요",
            "당신이 생각하는 것보다 훨씬 잘하고 있습니다 🌱 스스로를 믿어보세요",
            "지금의 노력이 가까운 미래에 기분 좋은 결과로 돌아옵니다 🎁",
            "새로운 기회는 준비된 사람에게 찾아옵니다 🚪 이미 준비는 충분합니다",
            "오늘의 선택이 내일의 당신을 더 빛나게 만듭니다 ✨ 자신 있게 선택하세요"
        ];

        // ✅ 쿠키 뽑기
        function drawCookie() {
            const randomIndex = Math.floor(Math.random() * fortuneMessages.length);
            const pickedMessage = fortuneMessages[randomIndex];

            document.getElementById("resultMsg").innerText = pickedMessage;
            document.getElementById("drawBtn").disabled = true;

            const shareBtn = document.getElementById("shareBtn");
            shareBtn.style.display = "inline-block";

            shareBtn.onclick = function() {
                shareResultToKakao(pickedMessage);
            };
        }

        // ✅ 카카오톡 전용 공유
        function shareResultToKakao(resultText) {
            const pageUrl = 'https://heatheryunryujang.github.io/fortune-cookie-for-13meeting/';

            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: '🥠 나의 행운 메시지가 도착했어요!',
                    description: resultText,
                    imageUrl: 'https://raw.githubusercontent.com/heatheryunryujang/fortune-cookie-for-13meeting/refs/heads/main/13%EB%AF%B8%ED%8C%85%20thumbnail.png',
                    link: {
                        mobileWebUrl: pageUrl,
                        webUrl: pageUrl,
                    },
                },
                buttons: [
                    {
                        title: '나도 포춘쿠키 뽑기',
                        link: {
                            mobileWebUrl: pageUrl,
                            webUrl: pageUrl,
                        },
                    },
                ],
            });
        }
    </script>

</body>
</html>
